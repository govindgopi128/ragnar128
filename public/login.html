<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAGNAR - Enter Your Realm</title>
    <!-- Google Fonts for Norse feel and modern UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="login-wrapper">
        <!-- Left Side: Viking Ship Wallpaper and Quote -->
        <div class="wallpaper-panel">
            <div class="wallpaper-overlay"></div>
            <div class="brand-header">
                <h1 class="logo-text">RAGNAR</h1>
                <p class="tagline">STRENGTH. HONOR. KNOWLEDGE.</p>
            </div>
            <div class="quote-container">
                <p class="quote">"I don't want to be king of the Danes or the Norwegians. I want to be king of myself."
                </p>
                <span class="quote-author">— Ragnar Lothbrok</span>
            </div>
        </div>

        <!-- Right Side: Login Portal -->
        <div class="login-panel">
            <div class="glass-form-container">
                <div class="runic-header">
                    <!-- SVG Viking Compass / Vegvisir Logo -->
                    <div class="logo-glow-wrapper">
                        <svg class="vegvisir-svg" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="0.5" fill="none"
                                stroke-dasharray="1 3" />
                            <circle cx="50" cy="50" r="40" stroke="currentColor" stroke-width="1" fill="none"
                                stroke-opacity="0.3" />
                            <!-- Center Point -->
                            <circle cx="50" cy="50" r="2" fill="currentColor" />
                            <!-- Runic Spoke lines -->
                            <line x1="50" y1="10" x2="50" y2="90" stroke="currentColor" stroke-width="1.5" />
                            <line x1="10" y1="50" x2="90" y2="50" stroke="currentColor" stroke-width="1.5" />
                            <line x1="22" y1="22" x2="78" y2="78" stroke="currentColor" stroke-width="1.5" />
                            <line x1="22" y1="78" x2="78" y2="22" stroke="currentColor" stroke-width="1.5" />
                            <!-- Branch Details (runic style endpoints) -->
                            <path d="M50 20 L45 25 M50 20 L55 25 M50 30 L43 35 M50 30 L57 35" stroke="currentColor"
                                stroke-width="1.2" fill="none" />
                            <path d="M50 80 L45 75 M50 80 L55 75 M50 70 L43 65 M50 70 L57 65" stroke="currentColor"
                                stroke-width="1.2" fill="none" />
                            <path d="M20 50 L25 45 M20 50 L25 55 M30 50 L35 43 M30 50 L35 57" stroke="currentColor"
                                stroke-width="1.2" fill="none" />
                            <path d="M80 50 L75 45 M80 50 L75 55 M70 50 L65 43 M70 50 L65 57" stroke="currentColor"
                                stroke-width="1.2" fill="none" />
                        </svg>
                    </div>
                    <h2>WELCOME BACK, WARRIOR</h2>
                    <p class="subtitle">Sign in to your realm</p>
                </div>

                <form id="loginForm" class="login-form">
                    <div class="error-msg-box" id="errorMsg"></div>

                    <div class="input-group">
                        <label for="username">USERNAME</label>
                        <div class="input-field-wrapper">
                            <span class="input-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                    <circle cx="12" cy="7" r="4" />
                                </svg>
                            </span>
                            <input type="text" id="username" name="username" placeholder="ragnar" required
                                autocomplete="off">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">PASSWORD</label>
                        <div class="input-field-wrapper">
                            <span class="input-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                                </svg>
                            </span>
                            <input type="password" id="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="rememberMe">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="#" class="forgot-pass-link" id="forgotLink">Forgot password?</a>
                    </div>

                    <button type="submit" class="glowing-btn">
                        <span class="btn-rune">⚔</span>
                        ENTER YOUR REALM
                        <span class="btn-rune">⚔</span>
                    </button>
                </form>

                <p class="form-footer">Not a warrior yet? You don't need an account.</p>
            </div>
        </div>
    </div>

    <script src="/js/login.js"></script>
</body>

</html>
